services:
  - type: web
    name: infecsure-api
    env: python
    region: singapore  # Closest to Colombo, Sri Lanka
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 10000
      --workers 1
      --backlog 64
      --timeout-keep-alive 5
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false  # Set this secret in the Render dashboard
      - key: APP_ENV
        value: production
